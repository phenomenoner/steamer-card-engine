    - /root/.openclaw/workspace/steamer-card-engine/docs/tech-notes/2026-03-19_steamer_card_engine_p1_live-trading-capability_v0_sprint-pack.md
  successReceipt: Repo truth contains a coherent product live-capability pack (capability posture states, operator control contract, bounded live path contract, and reportable sprint truth).
  reportImmediatelyOn:
    - important decision or milestone-definition change
    - rollback ambiguity
    - material scope / authority / resource boundary change

pathAudit:
  connectivityVerdict: connected
  notes:
    - Product docs already define the key safety and operator boundaries.
    - M1 already proved the sim-only product contract layer.
    - The next honest edge is guarded live capability, not broad production-readiness theater.
  fastestPath:
    - stage: capability-posture-contract
      ifGreenBy: within 0.5-1 active day after sprint start
    - stage: operator-control-contract
      ifGreenBy: within 1-2 active days after sprint start
    - stage: bounded-live-path-contract
      ifGreenBy: within 2-3 active days after sprint start
    - stage: reportable-p1
      ifGreenBy: within 2-4 active days after sprint start
  fastestMilestoneFinish: ~2-4 calendar days

coverage:
  status: active-sprint
  reportModel: report-immediately-on-important-decisions

evidenceTargets:
  - lane: capability-posture
    target: one explicit product posture ladder exists between sim-only and live-capable
  - lane: operator-controls
    target: one bounded operator control contract exists
  - lane: operatorization
    target: sprint doc + tech note + status/topology truth read coherently without chat archaeology

rolloutPolicy:
  overallPosture: active-sprint (scaffold-first)
  mode: staged
  executionPosture: forward-mandatory-inside-gates
  orderedStages:
    - capability-posture-contract
    - operator-control-contract
    - bounded-live-path-contract
    - reportable-p1

gates:
  allowAutoEnableApprovedJobs: false
  hardBoundaries:
    - do not redefine the milestone without approval
    - do not bypass stage order or gates
    - do not widen scope beyond the declared sprint
    - do not turn the controller into the main worker
    - do not blur Product Sprint P1 with Sprint A ownership
    - do not claim broad production readiness
    - do not hide live-authority posture behind ambiguous auth/session state
  escalationConditions:
    - milestone definition needs to change
    - the live-capability cut is genuinely ambiguous
    - rollback is needed and the clean path is unclear
    - repeated failures suggest the sprint should pause or change shape
    - the next move crosses into materially larger scope

actions:
  allowed:
    - update sprint doc
    - sync minimal related docs when repo truth changed
    - append concise durable notes to memory/YYYY-MM-DD.md
    - prepare rollout / rollback / observation checklists
    - scaffold the next bounded execution-pack/helper spec when it becomes truthful

