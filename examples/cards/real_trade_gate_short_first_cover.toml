card_id = "real-trade-gate-short-first-cover-v1"
name = "Real Trade Gate Short First Cover"
version = "0.1.0"
strategy_family = "real-trade-gate-smoke"
instrument_scope = ["TW_EQUITY"]
status = "operator-approved"
entry_module = "steamer_card_engine.cards.validation_smoke:short_first_cover_once"

symbol_pool = ["2330"]
feature_requirements = ["live.order_lifecycle", "operator.position_open_confirmed", "fixture.signal.short_first_cover_once"]

[parameters]
trigger = "short_first_cover_once"
side = "cover"
max_exits = 1
requires_position_open = true

[capital_controls]
max_order_notional = 50000
max_daily_notional = 50000
max_open_positions = 1

[risk_policy.stop_loss]
mode = "percent_from_entry"
value = 0.5

[risk_policy.take_profit]
mode = "timed_exit_seconds"
value = 10

[risk_policy.forced_exit]
start_time = "13:18:00"
end_time = "13:25:00"

[metadata]
owner = "operator"
purpose = "Stage 1 real-trade gate smoke: cover only after short entry is confirmed"
boundary = "manifest-only; no broker submission by itself"
